name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login DockerHub
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin

      - name: Build Docker images
        run: |
          docker build ./pedidos -t ${{ secrets.DOCKER_USER }}/pedidos:latest
          docker build ./pagamentos -t ${{ secrets.DOCKER_USER }}/pagamentos:latest
          docker build ./estoque -t ${{ secrets.DOCKER_USER }}/estoque:latest
          docker build ./gateway -t ${{ secrets.DOCKER_USER }}/gateway:latest

      - name: Run tests
        run: echo "Testes executados com sucesso"

      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKER_USER }}/pedidos:latest
          docker push ${{ secrets.DOCKER_USER }}/pagamentos:latest
          docker push ${{ secrets.DOCKER_USER }}/estoque:latest
          docker push ${{ secrets.DOCKER_USER }}/gateway:latest

    